<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>cvtvlvpr</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
  :root{
    --bg:#000;
    --accent:#7a2cff;
    --gold:#ffd000;
    --muted:#aaa;
    --card:#1b1b1b;
    --noise-opacity:0.08;
    --portal-border: rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    overflow-x:hidden;
    background:transparent; /* antes estaba var(--bg) */
  }

  .bg{
    position:fixed;
    inset:0;
    background: url("img/backrooms.png") center center / cover no-repeat;
    z-index:-2;
  }

  .overlay{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at 20% 0%, rgba(0,0,0,0.6), transparent),
               radial-gradient(circle at 80% 100%, rgba(0,0,0,0.8), transparent);
    z-index:-1;
  }

  main{
    position:relative;
    min-height:100vh;
    padding:32px 16px;
    max-width:960px;
    margin:0 auto;
  }

  h1{
    font-size:2.4rem;
    margin:0 0 8px;
    color:var(--gold);
    text-shadow:0 0 12px rgba(0,0,0,0.8);
  }

  h2{
    font-size:1.2rem;
    margin:0 0 24px;
    color:var(--muted);
  }

  .btn-main{
    display:inline-block;
    margin-bottom:24px;
    padding:12px 24px;
    border-radius:999px;
    background:var(--accent);
    color:white;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 18px rgba(122,44,255,0.6);
  }

  .grid{
    display:grid;
    gap:16px;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    margin-bottom:32px;
  }

  .card{
    background:var(--card);
    border-radius:16px;
    padding:16px;
    border:1px solid var(--portal-border);
    box-shadow:0 12px 30px rgba(0,0,0,0.6);
  }
