<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CVTVLVPR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

/* Fondo */

.bg{
    position:fixed;
    inset:0;
    background:url("img/backrooms.png") center center/cover no-repeat;
    filter:brightness(.8);
    z-index:-2;
}

/* Hero */

.hero{
    text-align:center;
    padding:220px 20px 180px;
}

.hero h1{
    font-size:4rem;
    color:#ffd000;
    text-shadow:0 0 20px #000;
}

.hero p{
    margin-top:20px;
    font-size:1.35rem;
    text-shadow:0 0 10px #000;
}

.btn{
    display:inline-block;
    margin-top:50px;
    padding:18px 55px;
    background:#7a2cff;
    color:#fff;
    text-decoration:none;
    border-radius:999px;
    font-weight:bold;
    font-size:1.2rem;
    transition:.3s;
    box-shadow:0 0 20px rgba(122,44,255,.6);
}

.btn:hover{
    transform:scale(1.05);
}

/* Tarjetas */

.cards{
    max-width:1100px;
    margin:auto;
    margin-top:120px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:40px;
    padding:20px;
}

.card{
    position:relative;
    height:300px;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:30px;
    color:#fff;
    text-decoration:none;
    background-size:cover;
    background-position:center;
    transition:.35s;
    border:2px solid rgba(255,255,255,.15);
    backdrop-filter:blur(3px);
    box-shadow:0 0 25px rgba(0,0,0,.65);
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.45);
    transition:.35s;
}

.card>*{
    position:relative;
    z-index:2;
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
}

.card:hover::before{
    background:rgba(0,0,0,.2);
}

/* Imágenes */

.twitch{
    background:
    linear-gradient(rgba(130,0,255,.20),rgba(60,0,120,.45)),
    url("img/dreamcore.png") center/cover;
}

.youtube{
    background:
    linear-gradient(rgba(255,0,0,.20),rgba(120,0,0,.45)),
    url("img/pasillo.png") center/cover;
}

.discord{
    background:
    linear-gradient(rgba(0,150,255,.20),rgba(0,70,150,.45)),
    url("img/poolrooms.jpg") center/cover;
}

.card h3{
    font-size:2rem;
    color:#ffd000;
    margin-bottom:10px;
    text-shadow:0 0 10px #000;
}

.card p{
    font-size:1.15rem;
    line-height:1.5;
    text-shadow:0 0 10px #000;
}

/* Sobre mí */

.sobre{
    margin-top:170px;
    background:#111;
    padding:90px 25px;
    text-align:center;
}

.sobre h2{
    color:#ffd000;
    font-size:2rem;
    margin-bottom:20px;
}

.sobre p{
    max-width:700px;
    margin:auto;
    color:#ccc;
    font-size:1.2rem;
    line-height:1.7;
}

/* Footer */

footer{
    text-align:center;
    padding:35px;
    color:#777;
    font-size:.9rem;
}
</style>
</head>

<body>

<div class="bg"></div>

<section class="hero">
    <h1>CVTVLVPR</h1>
    <p>No todos los que entran logran salir...</p>
    <a href="#links" class="btn">ENTRAR</a>
</section>

<section class="cards" id="links">

    <a class="card twitch" href="https://www.twitch.tv/cvtvlvpr" target="_blank">
        <h3>TWITCH</h3>
        <p>Dreamcore<br>DIRECTOS EN VIVO</p>
    </a>

    <a class="card youtube" href="https://www.youtube.com/@cvtvlvPR" target="_blank">
        <h3>YOUTUBE</h3>
        <p>Pasillo Infinito<br>VIDEOS</p>
    </a>

    <a class="card discord" href="https://discord.gg/8snPVCUxv" target="_blank">
        <h3>DISCORD</h3>
        <p>Poolrooms<br>COMUNIDAD</p>
    </a>

</section>

<section class="sobre">
    <h2>SOBRE MÍ</h2>
    <p>
        Nuevo creador de contenido el cual no se deja llevar en números
        sino en lo que le gusta.
    </p>
</section>

<footer>
    © 2026 CVTVLVPR
</footer>

</body>
</html>
