<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CVTVLVPR</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* ========================= */
/* ESTILOS BASE */
/* ========================= */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial, Helvetica, sans-serif;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ========================= */
/* FONDO BACKROOMS */
/* ========================= */
.bg{
  position:fixed;
  inset:0;
  background:url("backrooms.png") center center / cover no-repeat;
  z-index:-2;
  filter:brightness(0.85);
}

/* ========================= */
/* HERO */
/* ========================= */
.hero{
  text-align:center;
  padding:120px 20px 80px;
}

.hero h1{
  font-size:3rem;
  color:#ffd000;
  text-shadow:0 0 20px rgba(0,0,0,0.8);
}

.hero p{
  margin-top:10px;
  font-size:1.2rem;
  color:#fff;
  text-shadow:0 0 10px rgba(0,0,0,0.7);
}

.hero .btn{
  display:inline-block;
  margin-top:30px;
  padding:14px 40px;
  background:#7a2cff;
  color:white;
  font-weight:bold;
  border-radius:999px;
  text-decoration:none;
  font-size:1.1rem;
  box-shadow:0 0 20px rgba(122,44,255,0.6);
}

/* ========================= */
/* TARJETAS */
/* ========================= */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  padding:40px 20px;
  max-width:900px;
  margin:0 auto;
}

.card{
  padding:20px;
  border-radius:16px;
  text-align:center;
  color:white;
  font-weight:bold;
}

.card h3{
  font-size:1.4rem;
  margin-bottom:10px;
}

.card p{
  font-size:0.9rem;
  opacity:0.9;
}

/* Colores de cada tarjeta */
.twitch{background:#9146FF;}
.youtube{background:#FF0000;}
.discord{background:#5865F2;}

/* ========================= */
/* SOBRE MI */
/* ========================= */
.sobre{
  background:#111;
  padding:40px 20px;
  margin-top:40px;
  text-align:center;
}

.sobre h2{
  font-size:1.6rem;
  margin-bottom:20px;
  color:#ffd000;
}

.sobre p{
  max-width:700px;
  margin:0 auto;
  font-size:1rem;
  color:#ccc;
}

/* ========================= */
/* FOOTER */
/* ========================= */
footer{
  text-align:center;
  padding:20px;
  color:#777;
  font-size:0.8rem;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- HERO -->
<section class="hero">
  <h1>CVTVLVPR</h1>
  <p>No todos los que entran logran salir...</p>
  <a class="btn" href="#">ENTRAR</a>
</section>

<!-- TARJETAS -->
<section class="cards">
  <div class="card twitch">
    <h3>TWITCH</h3>
    <p>Dreamcore<br>DIRECTOS EN VIVO</p>
  </div>

  <div class="card youtube">
    <h3>YOUTUBE</h3>
    <p>Pasillo Infinito<br>VIDEOS</p>
  </div>

  <div class="card discord">
    <h3>DISCORD</h3>
    <p>Poolrooms<br>COMUNIDAD</p>
  </div>
</section>

<!-- SOBRE MI -->
<section class="sobre">
  <h2>SOBRE MÍ</h2>
  <p>
    Nuevo creador de contenido el cual no se deja llevar en números
    sino en lo que le gusta.
  </p>
</section>

<footer>
  © 2026 CVTVLVPR — stay liminal.
</footer>

</body>
</html>
